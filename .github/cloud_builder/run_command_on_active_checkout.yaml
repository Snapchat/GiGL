substitutions:
  _CMD: ""
options:
  logging: CLOUD_LOGGING_ONLY
steps:
  - name: us-central1-docker.pkg.dev/external-snap-ci-github-gigl/gigl-base-images/gigl-builder:6db83bdc98b2da65ac80243ce08cd8b37b3ee85f.110.1
    entrypoint: /bin/bash
    # Route sbt through Google's Maven Central mirror to avoid 429 rate limits from repo1.maven.org.
    # Intentionally set here (CI env) rather than in scala/.sbtopts or scala_spark35/.sbtopts to avoid
    # affecting downstream consumers of GiGL (e.g. as a submodule) that have their own Maven routing.
    env:
      - 'SBT_OPTS=-Dsbt.override.build.repos=true -Dsbt.repository.config=repositories'
    args:
      - -c
      - |
        set -e
        set -x

        if [[ -z "${_CMD}" ]]; then
          echo "Error: _CMD is not set."
          exit 1
        fi

        echo "Setting up environment..."
        # gcloud runner will run as a non-root user, but all paths/profiles, etc are set up for root
        mkdir -p /builder/home/.local/bin
        cp -r /root/.local/bin/ /builder/home/.local/
        echo "source /root/.bashrc" >> ~/.bashrc
        echo "source /root/.profile" >> ~/.profile

        source ~/.profile
        docker version
        docker buildx create --driver=docker-container --use
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        gcloud auth configure-docker us-central1-docker.pkg.dev
        # Install GiGL
        uv pip install -e .
        # The builder operates in its own user dir, usually /workspace,
        # so we need to copy the gigl tools dir to the current cloud_builder's user dir.
        # See: containers/Dockerfile.builder.
        # We cannot just symlink as that causes issues when trying to build the
        # dev workbench image i.e. symlinked sub dirs are not copied over.
        # See: containers/Dockerfile.gigl_workbench_container
        cp -rf /gigl_deps/tools/ tools

        echo "Finished setting up environment."
        echo "========================="
        echo "Running command: ${_CMD}"
        echo "========================="
        $_CMD
        echo "Finished running command"
